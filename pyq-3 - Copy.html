<!DOCTYPE html>
<html ng-app="itemApp">
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.2/angular.min.js"></script>
</head>
<body ng-controller="ItemCtrl">
  Name: <input ng-model="item.name">
  Category: <input ng-model="item.category">
  Price: <input ng-model="item.price">
  <button ng-click="addItem()">Add Item</button>

  <br>Search: <input ng-model="searchText">

  <table border="1">
    <tr><th>Name</th><th>Category</th><th>Price</th></tr>
    <tr ng-repeat="i in items | filter:searchText">
      <td>{{i.name | uppercase}}</td><td>{{i.category}}</td><td>{{i.price}}</td>
    </tr>
  </table>

<script>
angular.module('itemApp', [])
.controller('ItemCtrl', function($scope) {
  $scope.items = [];
  $scope.item = {};
  $scope.addItem = function() {
    $scope.items.push(angular.copy($scope.item));
    $scope.item = {};
  };
});
</script>
</body>
</html>
