<!DOCTYPE html>
<html>
<head>
<style>
table{
    width:50%;
    height:50vh;
    margin:auto;
    border-collapse:collapse;
    border:2px solid blue;
}

th,td{
    border:1px solid blue;
    padding:6px;
    text-align:right;
    vertical-align:bottom;
}

th{
    color:red;
}

.subpro{
    background-color:yellow;
}

.subcon{
    background-color:pink;
}

table:hover{
    border:4px solid green;
    opacity:0.8;
    transform:scale(1.05);
    transition:0.3s;
}
</style>
</head>

<body>

<table>

<tr>
    <th colspan="5">List</th>
</tr>

<tr>
    <th colspan="2">Pros</th>
    <th colspan="3">Cons</th>
</tr>

<tr>
    <td rowspan="2">Pro1</td>
    <td class="subpro">SubPro1.1</td>
    <td>Con1</td>
    <td rowspan="4">SubCon2.1</td>
</tr>

<tr>
    <td class="subpro">SubPro1.2</td>
    <td></td>
</tr>

<tr>
    <td rowspan="2">Pro2</td>
    <td></td>
    <td rowspan="2">Con2</td>
    <td class="subcon">SubCon2.2</td>
</tr>

<tr>
    <td></td>
    <td class="subcon">SubCon2.3</td>
</tr>

<tr>
    <td rowspan="2">Pro3</td>
    <td></td>
    <td rowspan="2">Con3</td>
    <td class="subcon">SubCon3.1</td>
</tr>

<tr>
    <td></td>
    <td class="subcon">SubCon3.2</td>
</tr>

<tr>
    <td colspan="2"></td>
    <td>Con4</td>
    <td></td>
</tr>

</table>

</body>
</html>
