<!DOCTYPE html>
<html>
<head>
<style>
table{
border:2px solid blue;
border-collapse:collapse;
width:50%;
height:50%;
th{color:red;}
td,th{border:1px solid blue;
padding:6px;
vertical-align:bottom;
text-align:right;
}
.subpro{background-color:yellow;}
.subcon{background-color:pink;}
table:hover
{border:4px solid green;
opacity:0.8;
transform:scale(1.03);}
</style>
</head>
<body>
<table>
<tr>
<th colspan="3">List</th></tr>
<tr>
<th colspan="2">Pros</th>
<th colspan="3">Cons</th>
</tr>
<tr>
<td rowspan="2">Pro1</td>
<td class="subpro">Subpro1.1</td>
<td>Con1</td><td></td>
</tr>
<tr>
<td class="subpro">Subpro1.2</td>
</tr>
<tr>
<td>Pro2</td><td></td>
<td rowspan="3">Con2</td><td></td>
<td class="subcon">SubCon2.1</td>
</tr>
<tr><td></td><td class="subcon">SubCon2.2</td></tr>
<tr><td></td><td class="subcon">SubCon2.3</td></tr>
<tr>
<td rowspan="2">Pros3</td><td></td>
<td rowspan="2">Con3</td><td class="subcon">Subcon3.1</td>
</tr>
<tr><td></td><td class="subcon">SubCon3.2</td></tr>
<tr><td></td><td>Con4</td><td></td></tr>
</table>
</body>
</html>
